<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Websites - Screen Time</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <h2><a href="dashboard.html" class="brand-logo">ScreenTime</a></h2>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="manage-websites.html" class="active">Websites</a>
            <a href="limits.html">Limits</a>
            <a href="reports.html">Reports</a>
            <a href="rewards.html">Rewards</a>
            <a href="#" onclick="logout()">Logout</a>
            <button onclick="toggleTheme()" class="btn btn-outline" style="padding:0; border:none; margin-top:0; font-size:1.2rem; cursor:pointer;" title="Toggle Light/Dark Mode">🌓</button>
        </div>
    </nav>

    <div class="container">
        <h1>Manage Tracked Websites</h1>

        <div class="glass-panel" style="margin-bottom: 2rem;">
            <h3>Add New Website</h3>
            <form id="add-form" style="display: flex; gap: 1rem; align-items: flex-end; margin-top: 1rem;">
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label>Website Name</label>
                    <input type="text" id="name" class="form-control" placeholder="e.g. YouTube" required>
                </div>
                <div class="form-group" style="flex: 2; margin-bottom: 0;">
                    <label>Website URL</label>
                    <input type="url" id="url" class="form-control" placeholder="https://youtube.com" required>
                </div>
                <button type="submit" class="btn btn-success" style="width: auto;">Add Tracker</button>
            </form>
        </div>

        <div class="glass-card">
            <h3>Your Tracked Websites</h3>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>URL</th>
                        <th style="width: 100px;">Actions</th>
                    </tr>
                </thead>
                <tbody id="website-list">
                    <!-- Populated by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        checkAuth();

        async function loadWebsites() {
            try {
                const websites = await apiRequest('/get-websites');
                const tbody = document.getElementById('website-list');
                tbody.innerHTML = '';
                
                if (websites.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="text-muted" style="text-align:center;">No websites tracked yet</td></tr>';
                    return;
                }

                websites.forEach(w => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${w.name}</td>
                        <td><a href="${w.url}" target="_blank">${w.url}</a></td>
                        <td>
                            <button class="btn btn-danger" style="padding: 0.25rem 0.5rem;" onclick="deleteWebsite(${w.id})">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                showError(err.message);
            }
        }

        async function deleteWebsite(id) {
            if (!confirm('Are you sure you want to stop tracking this website?')) return;
            try {
                await apiRequest(`/delete-website/${id}`, 'DELETE');
                loadWebsites();
            } catch (err) {
                alert(err.message);
            }
        }

        document.getElementById('add-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const url = document.getElementById('url').value;

            try {
                await apiRequest('/add-website', 'POST', { name, url });
                document.getElementById('add-form').reset();
                loadWebsites();
            } catch (err) {
                alert(err.message);
            }
        });

        window.onload = loadWebsites;
    </script>
</body>
</html>
