<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Screen Time</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="glass-panel" style="width: 100%; max-width: 400px; border-color: var(--accent-red);">
            <h2 id="form-title" style="text-align: center; color: var(--accent-red);">Admin Portal</h2>
            <div id="error-msg" class="alert"></div>

            <form id="auth-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" class="form-control" placeholder="admin@screentime.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-danger">Login as Admin</button>
            </form>

            <p style="text-align: center; margin-top: 1rem; font-size: 0.8rem;">
                <a href="index.html" class="text-muted">Return to User Login</a>
            </p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await apiRequest('/admin/login', 'POST', { email, password });
                localStorage.setItem('token', res.token);
                localStorage.setItem('user', JSON.stringify(res.user));
                window.location.href = 'admin-dashboard.html';
            } catch (err) {
                showError(err.message);
            }
        });
    </script>
</body>
</html>
